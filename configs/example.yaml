# Example Noctua Configuration

model:
  model_name: "gpt2"
  use_flash_attention: true
  attention_dropout: 0.0

data:
  dataset_path: ""
  batch_size: 8
  eval_batch_size: 8
  max_seq_length: 512
  num_workers: 4
  pin_memory: true

training:
  max_steps: 10000
  output_dir: "./output"
  run_name: "noctua-run"
  precision: "fp16"
  save_steps: 5000
  eval_steps: 1000
  logging_steps: 100
  warmup_steps: 100
  gradient_checkpointing: false
  seed: 42

optimizer:
  optimizer_type: "adamw"
  learning_rate: 1.0e-4
  beta1: 0.9
  beta2: 0.999
  epsilon: 1.0e-8
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  min_lr: 0.0
  max_grad_norm: 1.0

parallel:
  strategy: "dp"
  world_size: 1
  rank: 0
  local_rank: 0
  backend: "nccl"
  pipeline_parallel_size: 1
  tensor_parallel_size: 1
  zero_stage: 1
  gradient_accumulation_steps: 1
  gradient_clip_norm: 1.0
  broadcast_buffers: true
  find_unused_parameters: false

# System settings
use_cuda: true
use_flash_attention: true
master_addr: "localhost"
master_port: 29500
